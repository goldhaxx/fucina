name: "Rain Sensor — Water Level Detection"
board: hero-xl

components:
  - type: module
    name: "HW-038 Water"
    color: "#1565c0"
    pins:
      - hole: a10
        label: SIG
      - hole: a11
        label: VCC
      - hole: a12
        label: GND

wires:
  - from: a10
    to: pin_a0
    color: "#43a047"
    label: "signal — HERO XL A0"

  - from: a11
    to: pin7
    color: "#ff6f00"
    label: "power gate — HERO XL Pin 7"

  - from: a12
    to: gnd
    color: "#333333"
    label: "ground — HERO XL GND"
