name: "Potentiometer — Analog Read"
board: hero-xl

components:
  - type: potentiometer
    model: trimmer-pot-3386P
    pin1: a10
    pin2: a11
    pin3: a12

wires:
  - from: a10
    to: pin_a0
    color: "#43a047"
    label: "signal — HERO XL A0"

  - from: a11
    to: 5v
    color: "#e53935"
    label: "power — HERO XL 5V"

  - from: a12
    to: gnd
    color: "#333333"
    label: "ground — HERO XL GND"
