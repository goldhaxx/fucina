name: "Ultrasonic Sensor — Distance Measurement"
board: hero-xl

components:
  - type: module
    name: "HC-SR04"
    color: "#1565c0"
    pins:
      - hole: a10
        label: VCC
      - hole: a11
        label: TRIG
      - hole: a12
        label: ECHO
      - hole: a13
        label: GND

wires:
  - from: a10
    to: 5v
    color: "#e53935"
    label: "power — HERO XL 5V"

  - from: a11
    to: pin13
    color: "#ff6f00"
    label: "trigger — HERO XL Pin 13"

  - from: a12
    to: pin12
    color: "#1565c0"
    label: "echo — HERO XL Pin 12"

  - from: a13
    to: gnd
    color: "#333333"
    label: "ground — HERO XL GND"
