name: "PIR Motion Sensor — Motion Detection"
board: hero-xl

components:
  - type: module
    name: "HC-SR501 PIR"
    color: "#1565c0"
    pins:
      - hole: a10
        label: VCC
      - hole: a11
        label: OUT
      - hole: a12
        label: GND

wires:
  - from: a10
    to: 5v
    color: "#e53935"
    label: "power — HERO XL 5V"

  - from: a11
    to: pin2
    color: "#ff6f00"
    label: "signal — HERO XL Pin 2"

  - from: a12
    to: gnd
    color: "#333333"
    label: "ground — HERO XL GND"
