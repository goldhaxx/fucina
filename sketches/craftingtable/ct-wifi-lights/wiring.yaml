name: "WiFi Lights — ESP32 Access Point"
board: esp32

components:
  - type: led
    color: green
    anode: e10
    cathode: e11

wires:
  - from: a10
    to: pin2
    color: "#43a047"
    label: "LED signal — ESP32 GPIO 2"

  - from: a11
    to: gnd
    color: "#333333"
    label: "ground — ESP32 GND"
