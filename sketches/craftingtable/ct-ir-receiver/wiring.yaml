name: "IR Receiver — Remote Control Decoder"
board: hero-xl

components:
  - type: module
    name: "KY-022 IR"
    color: "#1565c0"
    pins:
      - hole: a10
        label: SIG
      - hole: a11
        label: VCC
      - hole: a12
        label: GND

wires:
  - from: a10
    to: pin11
    color: "#ff6f00"
    label: "signal — HERO XL Pin 11"

  - from: a11
    to: 5v
    color: "#e53935"
    label: "power — HERO XL 5V"

  - from: a12
    to: gnd
    color: "#333333"
    label: "ground — HERO XL GND"
