name: "Clap Lights — Sound Sensor Toggle"
board: hero-xl

components:
  - type: module
    name: "KY-038 Sound Sensor"
    color: "#1565c0"
    pins:
      - hole: e10
        label: VCC
      - hole: e11
        label: GND
      - hole: e12
        label: AO
      - hole: e13
        label: DO

wires:
  - from: a10
    to: 5v
    color: "#e53935"
    label: "sensor power — HERO XL 5V"

  - from: a11
    to: gnd
    color: "#333333"
    label: "sensor ground — HERO XL GND"

  - from: a12
    to: pin_a0
    color: "#43a047"
    label: "analog out — HERO XL A0"

  - from: a13
    to: pin2
    color: "#ff6f00"
    label: "digital out — HERO XL Pin 2"
