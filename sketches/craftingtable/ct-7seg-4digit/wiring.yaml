name: "7-Segment 4-Digit — Stopwatch"
board: hero-xl

components:
  - type: seven_segment
    digits: 4
    row_start: 10
    pins: 12

wires:
  # Left bank (e-side) — pins 1-6: E, D, DP, C, G, D4
  - from: a10
    to: pin10
    color: "#1565c0"
    label: "seg E (pin 1) — HERO XL Pin 10"

  - from: a11
    to: pin9
    color: "#607d8b"
    label: "seg D (pin 2) — HERO XL Pin 9"

  - from: a12
    to: pin13
    color: "#795548"
    label: "seg DP (pin 3) — HERO XL Pin 13"

  - from: a13
    to: pin8
    color: "#fdd835"
    label: "seg C (pin 4) — HERO XL Pin 8"

  - from: a14
    to: pin12
    color: "#43a047"
    label: "seg G (pin 5) — HERO XL Pin 12"

  - from: a15
    to: pin5
    color: "#e53935"
    label: "digit 4 (pin 6) — HERO XL Pin 5"

  # Right bank (f-side) — pins 12-7: D1, A, F, D2, B, D3
  - from: j10
    to: pin2
    color: "#e53935"
    label: "digit 1 (pin 12) — HERO XL Pin 2"

  - from: j11
    to: pin6
    color: "#ff6f00"
    label: "seg A (pin 11) — HERO XL Pin 6"

  - from: j12
    to: pin11
    color: "#7b1fa2"
    label: "seg F (pin 10) — HERO XL Pin 11"

  - from: j13
    to: pin4
    color: "#ff6f00"
    label: "digit 2 (pin 9) — HERO XL Pin 4"

  - from: j14
    to: pin7
    color: "#43a047"
    label: "seg B (pin 8) — HERO XL Pin 7"

  - from: j15
    to: pin3
    color: "#fdd835"
    label: "digit 3 (pin 7) — HERO XL Pin 3"
