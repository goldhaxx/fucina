name: "Real-Time Clock — DS3231"
board: hero-xl

components:
  - type: module
    name: "DS3231 RTC"
    color: "#e65100"
    pins:
      - hole: a10
        label: VCC
      - hole: a11
        label: GND
      - hole: a12
        label: SDA
      - hole: a13
        label: SCL

wires:
  - from: a10
    to: 5v
    color: "#e53935"
    label: "power — HERO XL 5V"

  - from: a11
    to: gnd
    color: "#333333"
    label: "ground — HERO XL GND"

  - from: a12
    to: pin20
    color: "#1565c0"
    label: "SDA — HERO XL Pin 20"

  - from: a13
    to: pin21
    color: "#43a047"
    label: "SCL — HERO XL Pin 21"
