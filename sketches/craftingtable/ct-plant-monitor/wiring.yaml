name: "Plant Monitor — Water Sensor + LED"
board: hero-xl

components:
  - type: led
    color: green
    anode: e10
    cathode: e11

  - type: module
    name: "HW-038 Water Sensor"
    color: "#1565c0"
    pins:
      - hole: e14
        label: SIG
      - hole: e15
        label: VCC
      - hole: e16
        label: GND

wires:
  - from: a10
    to: pin22
    color: "#43a047"
    label: "LED signal — HERO XL Pin 22 (PWM)"

  - from: a11
    to: gnd
    color: "#333333"
    label: "LED ground — HERO XL GND"

  - from: a14
    to: pin_a8
    color: "#1565c0"
    label: "water sensor signal — HERO XL A8"

  - from: a15
    to: 5v
    color: "#e53935"
    label: "sensor power — HERO XL 5V"

  - from: a16
    to: gnd
    color: "#333333"
    label: "sensor ground — HERO XL GND"
