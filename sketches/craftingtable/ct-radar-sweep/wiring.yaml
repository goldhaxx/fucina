name: "Radar Sweep — Servo + Ultrasonic + TFT"
board: hero-xl

components:
  - type: module
    name: "HC-SR04"
    color: "#1565c0"
    pins:
      - hole: e10
        label: TRIG
      - hole: e11
        label: ECHO
      - hole: e13
        label: VCC
      - hole: e14
        label: GND

  - type: module
    name: "SG90 Servo"
    color: "#2e7d32"
    pins:
      - hole: e12
        label: SIG
      - hole: e13
        label: VCC
      - hole: e14
        label: GND

wires:
  - from: a10
    to: pin22
    color: "#ff6f00"
    label: "ultrasonic TRIG — HERO XL Pin 22"

  - from: a11
    to: pin23
    color: "#1565c0"
    label: "ultrasonic ECHO — HERO XL Pin 23"

  - from: a12
    to: pin24
    color: "#7b1fa2"
    label: "servo signal — HERO XL Pin 24"

  - from: a13
    to: 5v
    color: "#e53935"
    label: "ultrasonic + servo power — HERO XL 5V"

  - from: a14
    to: gnd
    color: "#333333"
    label: "ultrasonic + servo ground — HERO XL GND"
