name: "RFID Reader — Card UID Scanner"
board: hero-xl

components:
  - type: module
    name: "RC522 RFID"
    color: "#e65100"
    pins:
      - hole: a5
        label: SDA
      - hole: a6
        label: SCK
      - hole: a7
        label: MOSI
      - hole: a8
        label: MISO
      - hole: a9
        label: RST
      - hole: a10
        label: VCC
      - hole: a11
        label: GND

wires:
  - from: a5
    to: pin53
    color: "#e53935"
    label: "SDA (SS) — HERO XL Pin 53"

  - from: a6
    to: pin52
    color: "#ff6f00"
    label: "SCK — HERO XL Pin 52"

  - from: a7
    to: pin51
    color: "#43a047"
    label: "MOSI — HERO XL Pin 51"

  - from: a8
    to: pin50
    color: "#1565c0"
    label: "MISO — HERO XL Pin 50"

  - from: a9
    to: pin26
    color: "#7b1fa2"
    label: "RST — HERO XL Pin 26"

  - from: a10
    to: 3v3
    color: "#ff6f00"
    label: "power — HERO XL 3.3V (NOT 5V!)"

  - from: a11
    to: gnd
    color: "#333333"
    label: "ground — HERO XL GND"
