name: "Sound Sensor — Clap Detection"
board: hero-xl

components:
  - type: module
    name: "KY-038 Sound"
    color: "#1565c0"
    pins:
      - hole: a10
        label: VCC
      - hole: a11
        label: GND
      - hole: a12
        label: A0
      - hole: a13
        label: D0

wires:
  - from: a10
    to: 5v
    color: "#e53935"
    label: "power — HERO XL 5V"

  - from: a11
    to: gnd
    color: "#333333"
    label: "ground — HERO XL GND"

  - from: a12
    to: pin_a0
    color: "#43a047"
    label: "analog out — HERO XL A0"

  - from: a13
    to: pin2
    color: "#ff6f00"
    label: "digital out — HERO XL Pin 2"
